<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:fragment="header">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['DM Sans', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50:  '#f0fdf4',
                            100: '#dcfce7',
                            500: '#22c55e',
                            600: '#16a34a',
                            700: '#15803d',
                            800: '#166534',
                            900: '#14532d',
                        },
                        surface: {
                            DEFAULT: '#0f172a',
                            card:    '#1e293b',
                            muted:   '#334155',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-down': 'slideDown 0.3s ease-out',
                    },
                    keyframes: {
                        fadeIn: { from: { opacity: '0' }, to: { opacity: '1' } },
                        slideDown: { from: { opacity: '0', transform: 'translateY(-8px)' }, to: { opacity: '1', transform: 'translateY(0)' } },
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { -webkit-font-smoothing: antialiased; }
        body { font-family: 'DM Sans', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .alert-dismissible .btn-close-tw {
            cursor: pointer;
            background: none; border: none; font-size: 1.1rem; line-height: 1;
            opacity: 0.6; transition: opacity 0.2s;
        }
        .alert-dismissible .btn-close-tw:hover { opacity: 1; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 3px; }
        .dropdown-menu-tw { display: none; }
        .dropdown-trigger:focus + .dropdown-menu-tw,
        .dropdown-trigger:focus-within + .dropdown-menu-tw,
        .dropdown-container:focus-within .dropdown-menu-tw { display: block; }
        nav a.nav-link-active { color: #22c55e !important; }
    </style>
</head>

<nav th:fragment="navbar"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
     class="bg-slate-900 border-b border-slate-700 sticky top-0 z-50 shadow-lg">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between h-16">
            <div class="flex items-center gap-8">
                <a th:href="@{/}" class="flex items-center gap-2 text-white font-bold text-lg tracking-tight hover:text-brand-500 transition-colors">
                    <span class="bg-brand-600 text-white rounded-lg w-8 h-8 flex items-center justify-center text-sm font-mono">PC</span>
                    Product CRUD
                </a>
                <div class="hidden md:flex items-center gap-1">
                    <a th:href="@{/dashboard}"
                       class="px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700 transition-all">
                        Dashboard
                    </a>
                    <a th:href="@{/products}"
                       class="px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700 transition-all">
                        Produk
                    </a>
                    <a sec:authorize="isAuthenticated()"
                       th:href="@{/categories}"
                       class="px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700 transition-all">
                        Kategori
                    </a>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <div sec:authorize="isAuthenticated()" class="relative dropdown-container">
                    <button class="dropdown-trigger flex items-center gap-2 px-3 py-2 rounded-lg text-sm text-slate-300 hover:text-white hover:bg-slate-700 transition-all focus:outline-none focus:ring-2 focus:ring-brand-500">
                        <span class="w-7 h-7 rounded-full bg-brand-600 flex items-center justify-center text-white text-xs font-bold uppercase"
                              th:text="${#strings.substring(#authentication.name, 0, 1)}">U</span>
                        <span class="hidden sm:inline" th:text="${#authentication.name}">User</span>
                        <svg class="w-4 h-4 opacity-60" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
                        </svg>
                    </button>
                    <div class="dropdown-menu-tw absolute right-0 mt-2 w-52 bg-white rounded-xl shadow-xl border border-slate-100 py-1 animate-slide-down">
                        <a th:href="@{/profile}" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            Profil Saya
                        </a>
                        <a th:href="@{/profile/edit}" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                            </svg>
                            Edit Profil
                        </a>
                        <a th:href="@{/profile/change-password}" class="flex items-center gap-3 px-4 py-2.5 text-sm text-slate-700 hover:bg-slate-50 transition-colors">
                            <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                            </svg>
                            Ganti Password
                        </a>
                        <div class="border-t border-slate-100 my-1"></div>
                        <form th:action="@{/logout}" method="post">
                            <button type="submit" class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-red-600 hover:bg-red-50 transition-colors text-left">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                                </svg>
                                Logout
                            </button>
                        </form>
                    </div>
                </div>
                <button id="mobile-menu-btn" class="md:hidden p-2 rounded-md text-slate-400 hover:text-white hover:bg-slate-700 transition-all focus:outline-none">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden pb-3 border-t border-slate-700 mt-1 pt-3">
            <a th:href="@{/dashboard}" class="block px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700 transition-all mb-1">Dashboard</a>
            <a th:href="@{/products}" class="block px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700 transition-all mb-1">Produk</a>
            <a sec:authorize="isAuthenticated()" th:href="@{/categories}" class="block px-3 py-2 rounded-md text-sm font-medium text-slate-300 hover:text-white hover:bg-slate-700 transition-all">Kategori</a>
        </div>
    </div>
    <script>
        document.getElementById('mobile-menu-btn').addEventListener('click', function() {
            document.getElementById('mobile-menu').classList.toggle('hidden');
        });
        document.addEventListener('click', function(e) {
            document.querySelectorAll('.dropdown-container').forEach(container => {
                if (!container.contains(e.target)) {
                    container.querySelectorAll('.dropdown-menu-tw').forEach(m => m.style.display = 'none');
                } else {
                    container.querySelectorAll('.dropdown-menu-tw').forEach(m => m.style.display = '');
                }
            });
        });
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelectorAll('.btn-close-tw').forEach(btn => {
                btn.addEventListener('click', function() {
                    this.closest('[role="alert"]').remove();
                });
            });
        });
    </script>
</nav>

<footer th:fragment="footer" class="mt-16 border-t border-slate-200 bg-white">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <p class="text-center text-sm text-slate-400 font-mono">
            Product CRUD &mdash; Praktikum JPA Fundamentals &mdash; 2026
        </p>
    </div>
</footer>

</html>
