<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-slate-50">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <!-- Breadcrumb -->
    <div class="flex items-center gap-2 text-sm text-slate-400 mb-6">
        <a th:href="@{/products}" class="hover:text-slate-600 transition-colors">Produk</a>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
        <span class="text-slate-600" th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk'">Form Produk</span>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="px-8 py-5 border-b border-slate-100 bg-slate-50">
            <h1 class="text-xl font-bold text-slate-800"
                th:text="${product.id != null} ? 'Edit Produk' : 'Tambah Produk Baru'">
                Form Produk
            </h1>
            <p class="text-sm text-slate-400 mt-0.5"
               th:text="${product.id != null} ? 'Perbarui informasi produk yang sudah ada' : 'Isi informasi untuk menambah produk baru'">
                Kelola produk Anda
            </p>
        </div>

        <div class="p-8">
            <form th:action="${product.id != null} ? @{/products/{id}/update(id=${product.id})} : @{/products/save}"
                  th:object="${product}" method="post" class="space-y-6">

                <input type="hidden" th:field="*{id}">

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <!-- Nama Produk -->
                    <div class="sm:col-span-2">
                        <label for="name" class="block text-sm font-medium text-slate-700 mb-1.5">
                            Nama Produk <span class="text-red-500">*</span>
                        </label>
                        <input type="text" id="name" th:field="*{name}"
                               class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                               placeholder="Masukkan nama produk" required>
                    </div>

                    <!-- Kategori -->
                    <!--
                        PERBAIKAN BUG #1:
                        Ganti name="categoryId" menjadi name="category.id"
                        Agar Spring MVC binding otomatis ke product.category.id
                        sehingga ProductController bisa membaca product.getCategory().getId()
                    -->
                    <div class="sm:col-span-2">
                        <label for="category.id" class="block text-sm font-medium text-slate-700 mb-1.5">Kategori</label>
                        <select id="categorySelect" name="category.id"
                                class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all bg-white">
                            <option value="">— Pilih Kategori —</option>
                            <option th:each="cat : ${categories}"
                                    th:value="${cat.id}"
                                    th:text="${cat.name}"
                                    th:selected="${product.category != null and product.category.id == cat.id}">
                            </option>
                        </select>
                        <p class="mt-1 text-xs text-slate-400">
                            Belum ada kategori?
                            <a th:href="@{/categories/new}" target="_blank" class="text-green-600 hover:underline">Tambah kategori baru</a>
                            (tab baru)
                        </p>
                    </div>
                </div>

                <!-- Harga & Stok -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label for="priceDisplay" class="block text-sm font-medium text-slate-700 mb-1.5">
                            Harga <span class="text-red-500">*</span>
                        </label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-sm text-slate-400 font-medium">Rp</span>
                            <input type="hidden" th:field="*{price}">
                            <input type="text" id="priceDisplay"
                                   class="w-full pl-10 pr-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                                   placeholder="0" required>
                        </div>
                    </div>

                    <div>
                        <label for="stock" class="block text-sm font-medium text-slate-700 mb-1.5">
                            Stok <span class="text-red-500">*</span>
                        </label>
                        <input type="number" id="stock" th:field="*{stock}" min="0"
                               class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                               placeholder="0" required>
                    </div>
                </div>

                <!-- Deskripsi -->
                <div>
                    <label for="description" class="block text-sm font-medium text-slate-700 mb-1.5">Deskripsi</label>
                    <textarea id="description" th:field="*{description}" rows="3"
                              class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all resize-none"
                              placeholder="Deskripsi produk (opsional)"></textarea>
                </div>

                <!-- Status & Tanggal -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 items-end">
                    <div class="flex items-center gap-3 p-4 border border-slate-200 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer">
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input type="checkbox" id="active" th:field="*{active}" class="sr-only peer">
                            <div class="w-10 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-green-600"></div>
                        </label>
                        <label for="active" class="text-sm font-medium text-slate-700 cursor-pointer">
                            Produk Aktif
                            <span class="block text-xs font-normal text-slate-400 mt-0.5">Produk aktif akan tampil di daftar</span>
                        </label>
                    </div>

                    <div>
                        <label for="createdAt" class="block text-sm font-medium text-slate-700 mb-1.5">
                            Tanggal Dibuat <span class="text-red-500">*</span>
                        </label>
                        <input type="date" id="createdAt" th:field="*{createdAt}"
                               class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                               required>
                    </div>
                </div>

                <!-- Tombol Aksi -->
                <div class="flex flex-col sm:flex-row gap-3 pt-2 border-t border-slate-100">
                    <button type="submit"
                            class="flex-1 px-6 py-2.5 bg-green-600 text-white text-sm font-semibold rounded-xl hover:bg-green-700 transition-colors">
                        Simpan Produk
                    </button>
                    <a th:href="@{/products}"
                       class="flex-1 sm:flex-none px-6 py-2.5 border border-slate-200 text-slate-600 text-sm font-medium rounded-xl hover:bg-slate-50 transition-colors text-center">
                        Batal
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>

<script>
    // Format harga dengan titik ribuan (Rupiah)
    const priceHidden = document.getElementById('price');
    const priceDisplay = document.getElementById('priceDisplay');

    function formatThousand(value) {
        return Number(value).toLocaleString('id-ID');
    }

    // Isi nilai awal saat edit (ambil dari hidden field)
    if (priceHidden.value && priceHidden.value !== '0') {
        priceDisplay.value = formatThousand(priceHidden.value);
    }

    // Saat user mengetik di field tampilan, update hidden field
    priceDisplay.addEventListener('input', function () {
        const oldValue = this.value;
        const cursorPos = this.selectionStart;
        const dotsBeforeCursor = oldValue.substring(0, cursorPos).split('.').length - 1;

        const raw = oldValue.replace(/\./g, '').replace(/\D/g, '');
        priceHidden.value = raw;
        const formatted = raw ? formatThousand(raw) : '';
        this.value = formatted;

        const digitPos = cursorPos - dotsBeforeCursor;
        const newDotsBeforeCursor = formatted.substring(0, digitPos + dotsBeforeCursor + 1).split('.').length - 1;
        this.setSelectionRange(digitPos + newDotsBeforeCursor, digitPos + newDotsBeforeCursor);
    });
</script>
</body>
</html>
