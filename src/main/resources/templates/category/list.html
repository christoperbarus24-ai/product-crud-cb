<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-slate-50">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-800">Daftar Kategori</h1>
            <p class="text-slate-500 text-sm mt-0.5">Kelola kategori produk Anda</p>
        </div>
        <a th:href="@{/categories/new}"
           class="inline-flex items-center gap-2 px-4 py-2.5 bg-green-600 text-white text-sm font-semibold rounded-xl hover:bg-green-700 transition-colors shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
            </svg>
            Tambah Kategori Baru
        </a>
    </div>

    <!-- Flash Messages -->
    <div th:if="${success}" role="alert"
         class="alert-dismissible mb-4 flex items-center justify-between gap-3 p-4 bg-green-50 border border-green-200 rounded-xl text-sm text-green-700">
        <div class="flex items-center gap-2">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
            <span th:text="${success}">Sukses</span>
        </div>
        <button class="btn-close-tw text-green-600">&times;</button>
    </div>
    <div th:if="${error}" role="alert"
         class="alert-dismissible mb-4 flex items-center justify-between gap-3 p-4 bg-red-50 border border-red-200 rounded-xl text-sm text-red-700">
        <div class="flex items-center gap-2">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            <span th:text="${error}">Error</span>
        </div>
        <button class="btn-close-tw text-red-600">&times;</button>
    </div>

    <!-- Result info -->
    <div class="mb-3 text-sm text-slate-500">
        <span>Total <span class="font-semibold text-slate-700" th:text="${#lists.size(categories)}">0</span> kategori</span>
    </div>

    <!-- Table -->
    <div th:if="${!#lists.isEmpty(categories)}"
         class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead>
                <tr class="bg-slate-50 border-b border-slate-100">
                    <th class="text-left px-5 py-3.5 text-xs font-semibold text-slate-500 uppercase tracking-wide">No</th>
                    <th class="text-left px-5 py-3.5 text-xs font-semibold text-slate-500 uppercase tracking-wide">Nama Kategori</th>
                    <th class="text-left px-5 py-3.5 text-xs font-semibold text-slate-500 uppercase tracking-wide">Deskripsi</th>
                    <th class="text-right px-5 py-3.5 text-xs font-semibold text-slate-500 uppercase tracking-wide">Aksi</th>
                </tr>
                </thead>
                <tbody class="divide-y divide-slate-50">
                <tr th:each="cat, iterStat : ${categories}" class="hover:bg-slate-50 transition-colors">
                    <td class="px-5 py-3.5 text-slate-400 font-mono text-xs"
                        th:text="${iterStat.index + 1}">1</td>
                    <td class="px-5 py-3.5 font-medium text-slate-800" th:text="${cat.name}">-</td>
                    <td class="px-5 py-3.5 text-slate-500">
                        <span th:if="${cat.description != null and !cat.description.isEmpty()}" th:text="${cat.description}">-</span>
                        <span th:unless="${cat.description != null and !cat.description.isEmpty()}" class="italic text-slate-300">Tidak ada deskripsi</span>
                    </td>
                    <td class="px-5 py-3.5">
                        <div class="flex items-center justify-end gap-2">
                            <a th:href="@{/categories/{id}/edit(id=${cat.id})}"
                               class="px-3 py-1.5 text-xs font-medium text-amber-700 bg-amber-50 border border-amber-200 rounded-lg hover:bg-amber-100 transition-colors">
                                Edit
                            </a>
                            <form th:action="@{/categories/{id}/delete(id=${cat.id})}" method="post"
                                  onsubmit="return confirm('Apakah Anda yakin ingin menghapus kategori ini?');">
                                <button type="submit"
                                        class="px-3 py-1.5 text-xs font-medium text-red-700 bg-red-50 border border-red-200 rounded-lg hover:bg-red-100 transition-colors">
                                    Hapus
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Empty State -->
    <div th:if="${#lists.isEmpty(categories)}"
         class="bg-white rounded-2xl border border-slate-100 shadow-sm p-16 text-center">
        <div class="text-5xl mb-4">🏷️</div>
        <h3 class="text-lg font-semibold text-slate-700 mb-2">Belum ada kategori</h3>
        <p class="text-slate-400 text-sm mb-5">Mulai buat kategori untuk mengelompokkan produk Anda.</p>
        <a th:href="@{/categories/new}"
           class="inline-flex items-center gap-2 px-4 py-2.5 bg-green-600 text-white text-sm font-semibold rounded-xl hover:bg-green-700 transition-colors">
            Tambah Kategori Pertama
        </a>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
