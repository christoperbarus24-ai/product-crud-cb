<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['DM Sans', 'sans-serif'] },
                    animation: { 'fade-in': 'fadeIn 0.4s ease-out' },
                    keyframes: { fadeIn: { from: { opacity: '0', transform: 'translateY(12px)' }, to: { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-font-smoothing: antialiased; }
        body { font-family: 'DM Sans', sans-serif; }
        .input-field {
            width: 100%; padding: 0.625rem 0.875rem;
            border: 1.5px solid #e2e8f0; border-radius: 0.5rem;
            font-size: 0.875rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
        }
        .input-field:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.12); }
        .btn-primary {
            width: 100%; padding: 0.625rem 1.25rem;
            background: #16a34a; color: #fff; font-weight: 600; font-size: 0.875rem;
            border-radius: 0.5rem; border: none; cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-primary:hover { background: #15803d; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-green-50 to-slate-100 flex items-center justify-center p-4">

<div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-green-200 rounded-full opacity-30 blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-emerald-200 rounded-full opacity-30 blur-3xl"></div>
</div>

<div class="w-full max-w-md animate-fade-in relative my-8">

    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-green-600 rounded-2xl shadow-lg mb-4">
            <span class="text-white font-bold text-xl font-mono">PC</span>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">Buat akun baru</h1>
        <p class="text-slate-500 text-sm mt-1">Daftar untuk mulai mengelola produk</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8">

        <div th:if="${error}" role="alert"
             class="mb-5 flex items-start gap-3 p-3.5 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
            <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            <span th:text="${error}">Error</span>
        </div>

        <form th:action="@{/register}" th:object="${registerRequest}" method="post" class="space-y-4">

            <p class="text-xs text-slate-400 font-medium uppercase tracking-wide">Informasi Profil (Opsional)</p>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label for="fullName" class="block text-sm font-medium text-slate-700 mb-1.5">Nama Lengkap</label>
                    <input type="text" id="fullName" th:field="*{fullName}" class="input-field" placeholder="Nama lengkap Anda">
                </div>
                <div>
                    <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                    <input type="email" id="email" th:field="*{email}" class="input-field" placeholder="email@contoh.com">
                </div>
            </div>

            <div class="border-t border-slate-100 my-1 pt-3">
                <p class="text-xs text-slate-400 font-medium uppercase tracking-wide mb-4">Kredensial Akun <span class="text-red-500">*Wajib</span></p>
            </div>

            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1.5">Username <span class="text-red-500">*</span></label>
                <input type="text" id="username" th:field="*{username}" class="input-field" placeholder="Pilih username unik" required autofocus>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Password <span class="text-red-500">*</span></label>
                <input type="password" id="password" th:field="*{password}" class="input-field" placeholder="Minimal 6 karakter" required>
            </div>

            <div>
                <label for="confirmPassword" class="block text-sm font-medium text-slate-700 mb-1.5">Konfirmasi Password <span class="text-red-500">*</span></label>
                <input type="password" id="confirmPassword" th:field="*{confirmPassword}" class="input-field" placeholder="Ulangi password" required>
            </div>

            <div class="pt-2">
                <button type="submit" class="btn-primary">Daftar Sekarang</button>
            </div>
        </form>

        <p class="text-center text-sm text-slate-500 mt-6">
            Sudah punya akun?
            <a th:href="@{/login}" class="text-green-600 font-semibold hover:text-green-700 transition-colors">Login di sini</a>
        </p>
    </div>
</div>
</body>
</html>
