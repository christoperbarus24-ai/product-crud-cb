<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Product CRUD</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['DM Sans', 'sans-serif'] },
                    animation: { 'fade-in': 'fadeIn 0.4s ease-out' },
                    keyframes: { fadeIn: { from: { opacity: '0', transform: 'translateY(12px)' }, to: { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { -webkit-font-smoothing: antialiased; }
        body { font-family: 'DM Sans', sans-serif; }
        .input-field {
            width: 100%; padding: 0.625rem 0.875rem;
            border: 1.5px solid #e2e8f0; border-radius: 0.5rem;
            font-size: 0.875rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            background: #fff;
        }
        .input-field:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.12); }
        .btn-primary {
            width: 100%; padding: 0.625rem 1.25rem;
            background: #16a34a; color: #fff; font-weight: 600; font-size: 0.875rem;
            border-radius: 0.5rem; border: none; cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn-primary:hover { background: #15803d; }
        .btn-primary:active { transform: scale(0.98); }
    </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 via-green-50 to-slate-100 flex items-center justify-center p-4">

<div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute -top-40 -right-40 w-80 h-80 bg-green-200 rounded-full opacity-30 blur-3xl"></div>
    <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-emerald-200 rounded-full opacity-30 blur-3xl"></div>
</div>

<div class="w-full max-w-md animate-fade-in relative">

    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-14 h-14 bg-green-600 rounded-2xl shadow-lg mb-4">
            <span class="text-white font-bold text-xl font-mono">PC</span>
        </div>
        <h1 class="text-2xl font-bold text-slate-800">Selamat datang kembali</h1>
        <p class="text-slate-500 text-sm mt-1">Masuk ke akun Product CRUD Anda</p>
    </div>

    <div class="bg-white rounded-2xl shadow-xl border border-slate-100 p-8">

        <div th:if="${param.error}" role="alert"
             class="mb-5 flex items-start gap-3 p-3.5 bg-red-50 border border-red-200 rounded-lg text-sm text-red-700">
            <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
            </svg>
            Username atau password salah!
        </div>

        <div th:if="${param.logout}" role="alert"
             class="mb-5 flex items-start gap-3 p-3.5 bg-blue-50 border border-blue-200 rounded-lg text-sm text-blue-700">
            <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
            </svg>
            Berhasil logout.
        </div>

        <div th:if="${success}" role="alert"
             class="mb-5 flex items-start gap-3 p-3.5 bg-green-50 border border-green-200 rounded-lg text-sm text-green-700">
            <svg class="w-4 h-4 mt-0.5 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
            <span th:text="${success}">Registrasi berhasil!</span>
        </div>

        <form th:action="@{/login}" method="post" class="space-y-5">
            <div>
                <label for="username" class="block text-sm font-medium text-slate-700 mb-1.5">Username</label>
                <input type="text" id="username" name="username" class="input-field"
                       placeholder="Masukkan username" required autofocus>
            </div>
            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 mb-1.5">Password</label>
                <input type="password" id="password" name="password" class="input-field"
                       placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn-primary">Masuk</button>
        </form>

        <p class="text-center text-sm text-slate-500 mt-6">
            Belum punya akun?
            <a th:href="@{/register}" class="text-green-600 font-semibold hover:text-green-700 transition-colors">Daftar di sini</a>
        </p>
    </div>
</div>
</body>
</html>
