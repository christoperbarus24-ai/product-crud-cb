<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-slate-50">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="flex items-center gap-2 text-sm text-slate-400 mb-6">
        <span class="text-slate-600">Profil Saya</span>
    </div>

    <!-- Flash message sukses -->
    <div th:if="${success}" role="alert"
         class="alert-dismissible mb-4 flex items-center justify-between gap-3 p-4 bg-green-50 border border-green-200 rounded-xl text-sm text-green-700">
        <div class="flex items-center gap-2">
            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20">
                <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"/>
            </svg>
            <span th:text="${success}">Sukses</span>
        </div>
        <button class="btn-close-tw text-green-600">&times;</button>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="p-8">
            <div class="flex flex-col sm:flex-row gap-8">

                <!-- Foto Profile -->
                <div class="flex-shrink-0">
                    <div th:if="${user.profileImageUrl != null and !user.profileImageUrl.isEmpty()}"
                         class="w-32 h-32 rounded-2xl overflow-hidden">
                        <img th:src="${user.profileImageUrl}"
                             class="w-full h-full object-cover"
                             alt="Foto Profil">
                    </div>
                    <div th:unless="${user.profileImageUrl != null and !user.profileImageUrl.isEmpty()}"
                         class="w-32 h-32 rounded-2xl bg-gradient-to-br from-green-500 to-emerald-600 flex items-center justify-center">
                        <span class="text-white text-4xl font-bold"
                              th:text="${#strings.substring(user.username, 0, 1).toUpperCase()}">U</span>
                    </div>
                </div>

                <!-- Info Profile -->
                <div class="flex-1">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-8 gap-y-4">
                        <div>
                            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Username</div>
                            <div class="text-sm font-medium text-slate-800" th:text="${user.username}">-</div>
                        </div>
                        <div>
                            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Nama Lengkap</div>
                            <div class="text-sm text-slate-800">
                                <span th:if="${user.fullName != null and !user.fullName.isEmpty()}" th:text="${user.fullName}">-</span>
                                <span th:unless="${user.fullName != null and !user.fullName.isEmpty()}" class="italic text-slate-300">Tidak diisi</span>
                            </div>
                        </div>
                        <div>
                            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Email</div>
                            <div class="text-sm text-slate-800">
                                <span th:if="${user.email != null and !user.email.isEmpty()}" th:text="${user.email}">-</span>
                                <span th:unless="${user.email != null and !user.email.isEmpty()}" class="italic text-slate-300">Tidak diisi</span>
                            </div>
                        </div>
                        <div>
                            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">No. Telepon</div>
                            <div class="text-sm text-slate-800">
                                <span th:if="${user.phoneNumber != null and !user.phoneNumber.isEmpty()}" th:text="${user.phoneNumber}">-</span>
                                <span th:unless="${user.phoneNumber != null and !user.phoneNumber.isEmpty()}" class="italic text-slate-300">Tidak diisi</span>
                            </div>
                        </div>
                        <div class="sm:col-span-2">
                            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Alamat</div>
                            <div class="text-sm text-slate-800">
                                <span th:if="${user.address != null and !user.address.isEmpty()}" th:text="${user.address}">-</span>
                                <span th:unless="${user.address != null and !user.address.isEmpty()}" class="italic text-slate-300">Tidak diisi</span>
                            </div>
                        </div>
                        <div class="sm:col-span-2">
                            <div class="text-xs font-semibold text-slate-400 uppercase tracking-wide mb-1">Bio</div>
                            <div class="text-sm text-slate-600 leading-relaxed">
                                <span th:if="${user.bio != null and !user.bio.isEmpty()}" th:text="${user.bio}">-</span>
                                <span th:unless="${user.bio != null and !user.bio.isEmpty()}" class="italic text-slate-300">Tidak diisi</span>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- Footer Actions -->
        <div class="px-8 py-5 border-t border-slate-100 bg-slate-50 flex flex-col sm:flex-row gap-3">
            <a th:href="@{/profile/edit}"
               class="flex-1 sm:flex-none inline-flex items-center justify-center gap-2 px-5 py-2.5 bg-green-600 text-white text-sm font-semibold rounded-xl hover:bg-green-700 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                Edit Profil
            </a>
            <a th:href="@{/profile/change-password}"
               class="flex-1 sm:flex-none inline-flex items-center justify-center gap-2 px-5 py-2.5 bg-amber-500 text-white text-sm font-semibold rounded-xl hover:bg-amber-600 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                </svg>
                Ganti Password
            </a>
            <a th:href="@{/products}"
               class="flex-1 sm:flex-none inline-flex items-center justify-center gap-2 px-5 py-2.5 border border-slate-200 text-slate-600 text-sm font-medium rounded-xl hover:bg-slate-100 transition-colors">
                ← Kembali ke Produk
            </a>
        </div>
    </div>

</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
