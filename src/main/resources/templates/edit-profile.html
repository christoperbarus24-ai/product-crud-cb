<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header}"></head>
<body class="bg-slate-50">
<nav th:replace="~{fragments/layout :: navbar}"></nav>

<div class="max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

    <div class="flex items-center gap-2 text-sm text-slate-400 mb-6">
        <a th:href="@{/profile}" class="hover:text-slate-600 transition-colors">Profil</a>
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
        </svg>
        <span class="text-slate-600">Edit Profil</span>
    </div>

    <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
        <div class="px-8 py-5 border-b border-slate-100 bg-slate-50">
            <h1 class="text-xl font-bold text-slate-800">Edit Profil</h1>
            <p class="text-sm text-slate-400 mt-0.5">Perbarui informasi profil Anda</p>
        </div>

        <div class="p-8">
            <form th:action="@{/profile/edit}"
                  th:object="${editProfileRequest}" method="post" class="space-y-6">

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div>
                        <label for="fullName" class="block text-sm font-medium text-slate-700 mb-1.5">Nama Lengkap</label>
                        <input type="text" id="fullName" th:field="*{fullName}"
                               class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                               placeholder="Masukkan nama lengkap">
                    </div>
                    <div>
                        <label for="email" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
                        <input type="email" id="email" th:field="*{email}"
                               class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                               placeholder="email@contoh.com">
                    </div>
                </div>

                <div>
                    <label for="phoneNumber" class="block text-sm font-medium text-slate-700 mb-1.5">No. Telepon</label>
                    <input type="text" id="phoneNumber" th:field="*{phoneNumber}"
                           class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                           placeholder="08xxxxxxxxxx">
                </div>

                <div>
                    <label for="address" class="block text-sm font-medium text-slate-700 mb-1.5">Alamat</label>
                    <textarea id="address" th:field="*{address}" rows="3"
                              class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all resize-none"
                              placeholder="Masukkan alamat lengkap"></textarea>
                </div>

                <div>
                    <label for="bio" class="block text-sm font-medium text-slate-700 mb-1.5">Bio</label>
                    <textarea id="bio" th:field="*{bio}" rows="3"
                              class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all resize-none"
                              placeholder="Ceritakan sedikit tentang diri Anda"></textarea>
                </div>

                <div>
                    <label for="profileImageUrl" class="block text-sm font-medium text-slate-700 mb-1.5">URL Foto Profil</label>
                    <input type="url" id="profileImageUrl" th:field="*{profileImageUrl}"
                           class="w-full px-4 py-2.5 text-sm border border-slate-200 rounded-xl outline-none focus:border-green-500 focus:ring-2 focus:ring-green-100 transition-all"
                           placeholder="https://example.com/foto.jpg">
                </div>

                <div class="flex flex-col sm:flex-row gap-3 pt-2 border-t border-slate-100">
                    <button type="submit"
                            class="flex-1 px-6 py-2.5 bg-green-600 text-white text-sm font-semibold rounded-xl hover:bg-green-700 transition-colors">
                        Simpan Perubahan
                    </button>
                    <a th:href="@{/profile}"
                       class="flex-1 sm:flex-none px-6 py-2.5 border border-slate-200 text-slate-600 text-sm font-medium rounded-xl hover:bg-slate-50 transition-colors text-center">
                        Batal
                    </a>
                </div>

            </form>
        </div>
    </div>
</div>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
